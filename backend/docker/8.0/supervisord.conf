[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php]
command=/usr/bin/php -d variables_order=EGPCS /var/www/html/artisan serve --host=0.0.0.0 --port=80
user=sail
environment=LARAVEL_SAIL="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:scheduler]
command=/bin/sh -c "while [ true ]; do (/usr/bin/php /var/www/html/artisan schedule:run --verbose --no-interaction &); sleep 60; done"
user=sail
autostart=true
autorestart=true
numprocs=1
redirect_stderr=true

[program:websockets]
user=sail
command=/usr/bin/php /var/www/html/artisan websocket:serve
autostart=true
autorestart=true
numprocs=1

[program:queue]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/html/artisan queue:work --queue=default,sms,emails --delay=3 --verbose --sleep=3 --tries=3
user=sail
autostart=true
autorestart=true
numprocs=8
redirect_stderr=true