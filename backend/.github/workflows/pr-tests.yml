name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: Tests (PHP 8.1)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, zip, gd, pdo, pdo_mysql, bcmath, soap, intl, redis, imagick, pcov
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction --optimize-autoloader

      - name: Copy environment file
        run: |
          if [ ! -f .env ]; then
            echo "APP_NAME=Laravel" > .env
            echo "APP_ENV=testing" >> .env
            echo "APP_KEY=" >> .env
            echo "APP_DEBUG=true" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=testing" >> .env
            echo "DB_USERNAME=sail" >> .env
            echo "DB_PASSWORD=password" >> .env
            echo "CACHE_DRIVER=redis" >> .env
            echo "SESSION_DRIVER=redis" >> .env
            echo "QUEUE_CONNECTION=redis" >> .env
            echo "REDIS_HOST=127.0.0.1" >> .env
            echo "REDIS_PASSWORD=null" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "MAIL_MAILER=log" >> .env
            echo "ALLOW_SEND_SMS=false" >> .env
          fi

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Create Vite manifest for tests
        run: |
          mkdir -p public/build/assets
          # Create empty asset files
          touch public/build/assets/core.js
          touch public/build/assets/tailwind.css
          touch public/build/assets/invoice-pdf.css
          # Create minimal manifest.json
          cat > public/build/manifest.json << 'EOF'
          {
            "resources/js/core.js": {
              "file": "assets/core.js",
              "src": "resources/js/core.js",
              "isEntry": true
            },
            "resources/css/tailwind.css": {
              "file": "assets/tailwind.css",
              "src": "resources/css/tailwind.css",
              "isEntry": true
            },
            "resources/css/views/invoice-pdf.css": {
              "file": "assets/invoice-pdf.css",
              "src": "resources/css/views/invoice-pdf.css",
              "isEntry": true
            }
          }
          EOF

      - name: Run Catalog module tests
        run: php artisan test --testsuite=Catalog

      - name: Run Chatly module tests
        run: php artisan test --testsuite=Chatly

      - name: Run Invoicify module tests
        run: php artisan test --testsuite=Invoicify

      - name: Check code style with Pint
        run: ./vendor/bin/pint --test

